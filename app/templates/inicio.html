<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Builder</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/cvb.css') }}">
</head>
<body class="cvb-bg">

    <main class="cvb-hero">
        <p class="cvb-tagline cvb-anim-fade-up">Crea tu CV en minutos</p>
        <h1 class="cvb-heading cvb-anim-fade-up cvb-anim--d1">¿Por dónde quieres<br>empezar?</h1>

        <div class="cvb-grid cvb-anim-fade-up cvb-anim--d2">
            <a href="{{ url_for('auth.login') }}" class="cvb-card-home">
                <button class="cvb-btn">Comenzar</button>
            </a>
            <a href="{{ url_for('auth.register') }}" class="cvb-card-home">
                <button class="cvb-btn">Crear cuenta</button>
            </a>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/inicio.js') }}"></script>
</body>
</html>
